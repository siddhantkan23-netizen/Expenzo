name: Build iOS App

on:
  push:
    branches: [ main ] # Triggers the build every time you save code to 'main'

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Web Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build # Changes this to your framework's build command if needed (e.g., ionic build)

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Compile Xcode Project
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -allowProvisioningUpdates build CODE_SIGNING_ALLOWED=NO
