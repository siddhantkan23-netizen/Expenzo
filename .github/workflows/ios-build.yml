name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # CHANGE THIS STEP BELOW 👇
    - name: Install Web Dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --include=optional

    - name: Build Web App
      run: npm run build

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Compile Xcode Project
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -allowProvisioningUpdates build CODE_SIGNING_ALLOWED=NO
